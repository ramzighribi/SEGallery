name: Deploy SEGallery to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-segallery
  AZURE_LOCATION: westeurope

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Build Frontend ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build client
        working-directory: ./client
        run: |
          npm ci
          npm run build

      # ── Build API ──
      - name: Install and build API
        working-directory: ./api
        run: |
          npm ci
          npm run build

      # ── Deploy to Azure Static Web Apps ──
      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Deploy to Azure Static Web Apps
        run: |
          swa deploy ./client/dist \
            --api-location ./api/build \
            --deployment-token ${{ secrets.SWA_DEPLOYMENT_TOKEN }} \
            --env production \
            --api-language node \
            --api-version 20
